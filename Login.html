

</html><!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | CardBill Hub</title>

    <link rel="stylesheet" href="css/auth.css">
        <link rel="icon" type="image/png" href="images/canvas.png">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="login-page">

    <div class="login-container">

        <!-- LEFT SIDE -->

        <div class="login-left">

            <img src="images/canvas.png" alt="CardBill Hub Logo">

            <h1>Welcome Back!</h1>

            <p>
                Sign in to your CardBill Hub account and continue enjoying
                fast, secure and reliable digital payment services.
            </p>

            <div class="features">

                <div>
                    <i class="fa-solid fa-circle-check"></i>
                    Secure Login
                </div>

                <div>
                    <i class="fa-solid fa-circle-check"></i>
                    Instant Transactions
                </div>

                <div>
                    <i class="fa-solid fa-circle-check"></i>
                    24/7 Customer Support
                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="login-right">

            <h2>Login</h2>

            <p class="subtitle">
                Access your account
            </p>

            <form>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                    type="email"
                    placeholder="Email Address"
                    required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    placeholder="Password"
                    required>

                </div>

                <div class="remember">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button>

                    Login

                </button>

            </form>

            <p class="register">

                Don't have an account?

                <a href="register.html">

                    Register Here

                </a>

            </p>

        </div>

    </div>

</section>

</body>

</html>
