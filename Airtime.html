<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buy Airtime | CardBill Hub</title>

    <link rel="stylesheet" href="Airtime.css">

</head>

<body>

    <div class="airtime-container">

        <div class="airtime-card">

            <a href="Dashboard.html" class="back">
                ← Back to Dashboard
            </a>

            <h1>Buy Airtime</h1>

            <p class="subtitle">
                Recharge any Nigerian phone number instantly.
            </p>


            <!-- PHONE NUMBER -->

            <div class="form-group">

                <label>Phone Number</label>

                <input
                    type="tel"
                    placeholder="Enter phone number"
                    maxlength="11"
                >

            </div>


            <!-- NETWORK -->

            <div class="form-group">

                <label>Select Network</label>

                <div class="network-options">

                    <button type="button">MTN</button>

                    <button type="button">Airtel</button>

                    <button type="button">Glo</button>

                    <button type="button">9mobile</button>

                </div>

            </div>


            <!-- AMOUNT -->

            <div class="form-group">

                <label>Select Amount</label>

                <div class="amount-options">

                    <button type="button">₦100</button>

                    <button type="button">₦200</button>

                    <button type="button">₦500</button>

                    <button type="button">₦1,000</button>

                    <button type="button">₦2,000</button>

                    <button type="button">₦5,000</button>

                </div>

            </div>


            <button class="continue-btn">

                Continue

            </button>

        </div>

    </div>

</body>

</html>
